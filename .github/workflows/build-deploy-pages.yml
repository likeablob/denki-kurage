name: Build and Deploy Web Flasher

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v3
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build Firmware (CYD)
        run: pio run -e cyd

      - name: Build Firmware (CYD2USB)
        run: pio run -e cyd2usb

      - name: Prepare Web Flasher Files
        run: |
          # CYD Binaries
          cp .pio/build/cyd/bootloader.bin webflash/cyd/
          cp .pio/build/cyd/partitions.bin webflash/cyd/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin webflash/cyd/
          cp .pio/build/cyd/firmware.bin webflash/cyd/

          # CYD2USB Binaries
          cp .pio/build/cyd2usb/bootloader.bin webflash/cyd2usb/
          cp .pio/build/cyd2usb/partitions.bin webflash/cyd2usb/
          cp ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin webflash/cyd2usb/
          cp .pio/build/cyd2usb/firmware.bin webflash/cyd2usb/

      - name: Setup Github Pages
        uses: actions/configure-pages@v4

      - name: Upload GitHub Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./webflash

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
